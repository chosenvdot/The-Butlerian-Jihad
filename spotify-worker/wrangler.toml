name = "victorbrasil-spotify"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Cache for the last-played payload (TTL is set in code, ~45s).
[[kv_namespaces]]
binding = "SPOTIFY_KV"
id = "4b2fb35d77d743b7a32c83528f927fde"

[vars]
# Comma-separated allowlist of site origins permitted to call this worker.
# Updated with the real production origin after the first deploy.
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:5181,http://127.0.0.1:5173,http://127.0.0.1:5181,https://victorbrasil.chosenvictor12.workers.dev"
